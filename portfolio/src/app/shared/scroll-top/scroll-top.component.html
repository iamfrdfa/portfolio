<button
    class="scrollTopPill"
    type="button"
    (click)="scrollToTop()"
    [class.isVisible]="isVisible"
    [class.overFooter]="overFooter"
    aria-label="Scroll to top"
    title="Nach oben scrollen"
>
  <span class="scrollTopMotion" aria-hidden="true">
    <span class="scrollTopGlyph">↑</span>
  </span>
</button>
